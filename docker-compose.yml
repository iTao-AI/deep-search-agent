services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - TASKS_DB_PATH=/app/data/tasks.db
      - DECISION_RESEARCH_AGENT_CHECKPOINT_DB_PATH=/app/data/review_checkpoints.db
      - DECISION_RESEARCH_AGENT_ENABLE_DURABLE_HITL=${DECISION_RESEARCH_AGENT_ENABLE_DURABLE_HITL:-false}
      - API_SECRET
    volumes:
      - backend_data:/app/data
      - backend_output:/app/output
    depends_on:
      mysql:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    # Bind to localhost only — no external network exposure
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deep_search}
      MYSQL_USER: ${MYSQL_USER:-deep_search}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deep_search_password}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  backend_data:
  backend_output:
  mysql_data:

networks:
  app-network:
    driver: bridge
