version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    # The Python 3.11 release lock is regenerated and verified as one unit.
    # Repository-level Dependabot security updates remain enabled separately.
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
