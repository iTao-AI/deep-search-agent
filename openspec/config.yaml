schema: spec-driven

context: |
  项目：Deep Search Agent — 自主规划的信息检索与报告生成 Agent
  架构：LangGraph + DeepAgents SDK，主 Agent 委派三个子 Agent（网络搜索/数据库查询/RAGFlow 知识库）
  技术栈：
    - 后端：Python 3.11+、FastAPI + Uvicorn、LangChain/LangGraph
    - 前端：Vue 3 + Vite + TypeScript
    - 数据库：MySQL（业务数据）、RAGFlow（企业知识库）
    - 外部服务：Tavily Search API、DashScope Qwen-Max（LLM）
  通信：REST API（任务提交/文件管理）+ WebSocket（实时推理流）
  部署目标：Docker Compose（backend + frontend + MySQL）

  代码规范：
    - 中文注释，代码术语使用英文
    - 工具函数使用 @tool 装饰器，错误处理统一返回错误字符串而非抛异常
    - 异步函数使用 async/await，禁止混用同步阻塞调用
    - 所有文件读写使用 session 隔离的工作目录

rules:
  proposal:
    - 必须明确写出 out-of-scope（不做什么）
    - 必须评估对现有功能的影响（回归风险评估）
    - 必须包含技术选型说明（为什么选 A 不选 B）
  specs:
    - 使用 Given/When/Then 格式描述交互行为
    - 每个 spec 必须包含至少一个边界/异常场景
    - Agent 相关 spec 需明确输入输出格式和错误处理方式
  design:
    - 当变更涉及架构调整、跨模块影响、新外部依赖、数据结构变更或技术选型时，必须创建 design.md
    - design.md 应记录技术决策及其理由（为什么选 A 不选 B），而非逐行实现细节
    - 简单变更（纯配置、单文件修复、文案修改）可不创建 design.md
  tasks:
    - 每个任务粒度不超过 30 分钟
    - 按 Phase 分组，每个 Phase 结束后等待确认
    - 安全相关任务（SQL 校验、路径遍历等）必须优先完成

languages: |
  Generate all artifacts in Simplified Chinese.
  Use English for code-related terms (function names, class names, error messages).
